<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVENICE | A Palazzo</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--borgogna:#8B1A4A;--viola:#5B2A8B;--vmedio:#7B4FA6;--lavanda:#9B7CC4;--lchiaro:#C4A0D4;--nero:#1A1018;--panna:#F8F4F0;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Josefin Sans',sans-serif;background:#1A1018;color:var(--panna);height:100vh;display:flex;flex-direction:column;overflow:hidden;}
header{background:var(--nero);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(155,124,196,0.25);flex-shrink:0;z-index:1000;}
.logo{display:flex;align-items:baseline;gap:10px;}
.lt{font-size:20px;font-weight:600;letter-spacing:.25em;}
.lt .L{color:#8B1A4A}.lt .O{color:#B5224F}.lt .V{color:#5B2A8B}.lt .E{color:#7B4FA6}.lt .N{color:#8B1A4A}.lt .I{color:#9B7CC4}.lt .CE{color:#C4A0D4}
.ls{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:14px;color:var(--lavanda);}
.lsw{display:flex;gap:4px;}
.lb{padding:5px 12px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border:1px solid rgba(155,124,196,.25);background:transparent;color:rgba(248,244,240,.4);font-family:'Josefin Sans',sans-serif;transition:all .2s;}
.lb:hover{color:var(--lavanda);border-color:rgba(155,124,196,.5);}
.lb.active{color:var(--panna);border-color:var(--lavanda);background:rgba(155,124,196,.1);}
.main{display:flex;flex:1;overflow:hidden;position:relative;}
.sidebar{width:290px;background:var(--nero);border-right:1px solid rgba(155,124,196,.15);display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s ease;z-index:100;}
.sbh{padding:16px 18px 10px;border-bottom:1px solid rgba(155,124,196,.1);}
.sbh h2{font-family:'Cormorant Garamond',serif;font-size:22px;font-weight:300;}
.sbh p{font-size:9px;letter-spacing:.14em;color:var(--lavanda);margin-top:4px;text-transform:uppercase;}
.slbl{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(155,124,196,.4);padding:10px 18px 4px;}
.plist{overflow-y:auto;flex:1;}
.plist::-webkit-scrollbar{width:2px;}
.plist::-webkit-scrollbar-thumb{background:var(--viola);}
.pi{padding:9px 18px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:10px;}
.pi:hover{background:rgba(155,124,196,.07);}
.pi.active{background:rgba(155,124,196,.1);border-left-color:var(--lavanda);}
.pi.bonus{opacity:.65;}
.pi.bonus:hover{opacity:.85;}
.pic{flex-shrink:0;width:24px;height:24px;}
.pii h3{font-family:'Cormorant Garamond',serif;font-size:13px;font-weight:400;line-height:1.2;color:var(--panna);}
.pii span{font-size:8px;letter-spacing:.1em;color:rgba(248,244,240,0.6);}
#map{flex:1;z-index:1;}

/* Toggle button — visible only on mobile */
.sidebar-toggle{display:none;position:fixed;bottom:24px;left:16px;z-index:999;background:var(--borgogna);border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;justify-content:center;}
.sidebar-toggle svg{width:22px;height:22px;fill:white;}

/* Overlay behind sidebar on mobile */
.sidebar-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:99;}

/* MOBILE */
@media(max-width:768px){
  .lt{font-size:15px;}
  .ls{font-size:12px;}
  .sidebar{position:fixed;top:0;left:0;height:100%;transform:translateX(-100%);}
  .sidebar.open{transform:translateX(0);}
  .sidebar-toggle{display:flex;}
  .sidebar-overlay.open{display:block;}
  #map{width:100vw;}
  .leaflet-popup-content-wrapper{max-width:85vw!important;}
  .ptxt{font-size:11px;}
}

.leaflet-popup-content-wrapper{background:#FAF7F2!important;border:1px solid rgba(155,124,196,.3)!important;border-radius:2px!important;box-shadow:0 8px 32px rgba(0,0,0,.4)!important;color:#2A2030!important;max-width:300px!important;}
.leaflet-popup-tip{background:#FAF7F2!important;}
.leaflet-popup-close-button{color:#9B7CC4!important;font-size:16px!important;}
.pw{font-family:'Josefin Sans',sans-serif;color:#2A2030;}
.ph{display:flex;align-items:flex-start;gap:10px;margin-bottom:10px;padding-bottom:10px;border-bottom:1px solid rgba(155,124,196,.2);}
.pht h3{font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:400;line-height:1.2;margin-bottom:3px;}
.pf{font-size:8px;letter-spacing:.12em;text-transform:uppercase;opacity:0.7;}
.ptxt{font-size:10.5px;color:#4A3D50;line-height:1.65;margin-bottom:10px;}
.pinfo{display:flex;flex-direction:column;gap:4px;}
.pir{display:flex;gap:8px;font-size:9.5px;color:#4A3D50;}
.pir .l{font-size:8px;letter-spacing:.1em;text-transform:uppercase;flex-shrink:0;min-width:52px;}
.pir a{text-decoration:none;word-break:break-all;}
.pir a:hover{text-decoration:underline;}
.pnote{margin-top:10px;padding:8px 10px;border-radius:1px;font-size:10px;color:#4A3D50;line-height:1.65;font-style:normal;}
.pnote strong{font-style:normal;font-size:8px;letter-spacing:.1em;text-transform:uppercase;display:block;margin-bottom:3px;}
.pbadge{display:inline-flex;align-items:center;font-size:8px;letter-spacing:.12em;text-transform:uppercase;padding:3px 8px;margin-bottom:8px;}
.cf{color:#3A7A4A;}.cp{color:#8B1A4A;}.cm{color:#A07820;}
</style>
</head>

    <div class="ls">A Palazzo</div>

</div>

{id:1,b:false,nome:'Palazzo Pisani Moretta',fond:'Fondazione Dries Van Noten',civ:'San Polo 2766',vap:'Linea 1 \u00b7 San Tom\u00e0',sito:'fondazionedriesvannoten.org/it',costo:'\u20ac',lat:45.43603538403523,lng:12.329334202646745,col:'#69003A',
it:'Edificato nella seconda met\u00e0 del XV secolo, dimora della famiglia Pisani dal 1629, venne profondamente trasformato dal 1737 da Chiara Pisani, che ne fece decorare i saloni dai pi\u00f9 famosi pittori dell\u2019epoca come Tiepolo e Veronese. In tempi recenti il Palazzo fu di propriet\u00e0 dei fratelli Sammartini, e reso noto per le sue feste e per i set cinematografici che qui sono stati allestiti. Dal 2025 la Fondazione Dries Van Noten l\u2019ha acquistato con il progetto di farne fucina di idee, capace di tramandare la maestria veneziana attraverso la fusione di design, arte, performance e musica. L\u2019accesso \u00e8 riservato agli Amici della Fondazione: una tessera a diversi livelli di costo che include la prenotazione online dello slot di visita con accesso illimitato durante il periodo di validit\u00e0.',
en:'Built in the second half of the 15th century, the palace became the residence of the Pisani family in 1629 and was profoundly transformed from 1737 by Chiara Pisani, who had its grand halls decorated by the foremost painters of the era, including Tiepolo and Veronese. More recently it was owned by the Sammartini brothers, gaining fame for its lavish parties and as a film location. In 2025 the Fondazione Dries Van Noten acquired it with the ambition of making it a crucible of ideas \u2014 a place to carry forward Venetian craftsmanship through the fusion of design, art, performance and music. Access is reserved for Friends of the Foundation: a membership at various price levels that includes online booking of visit slots with unlimited access during its period of validity.',
fr:'\u00c9difi\u00e9 dans la seconde moiti\u00e9 du XVe si\u00e8cle, le palais devient la r\u00e9sidence de la famille Pisani \u00e0 partir de 1629, avant d\u2019\u00eatre profond\u00e9ment transform\u00e9 d\u00e8s 1737 par Chiara Pisani, qui fait d\u00e9corer ses grands salons par les peintres les plus c\u00e9l\u00e8bres de l\u2019\u00e9poque, dont Tiepolo et V\u00e9ron\u00e8se. En 2025, la Fondation Dries Van Noten l\u2019a acquis avec l\u2019ambition d\u2019en faire un creuset d\u2019id\u00e9es \u2014 un lieu pour perp\u00e9tuer le savoir-faire v\u00e9nitien \u00e0 travers la fusion du design, de l\u2019art, de la performance et de la musique. L\u2019acc\u00e8s est r\u00e9serv\u00e9 aux Amis de la Fondation.'},

{id:2,b:false,nome:"Ca\u2019 Corner della Regina",fond:'Fondazione Prada',civ:'Santa Croce 2215',vap:'Linea 1 \u00b7 San Stae | Rialto Mercato',sito:'fondazioneprada.org/visit/visit-venezia',costo:'\u20ac',lat:45.440832488528216,lng:12.332300785805836,col:'#C4962A',
it:"Costruito nel 1723 da Domenico Rossi per la famiglia Corner, ispirandosi alla vicina Ca\u2019 Pesaro progettata da Baldassare Longhena. Propriet\u00e0 di Papa Pio VII dal 1800, donato alla Congregazione dei Padri Cavanis nel 1817, vi trova sede fino al 1969 il Monte di Piet\u00e0, successivamente l\u2019ASAC, Archivio Storico delle Arti Contemporanee della Biennale di Venezia fino al 2010. Nel 2011 viene acquisito dalla Fondazione Prada, che ne porta avanti un restauro conservativo, aprendone le porte per progetti espositivi temporanei in concomitanza con la Biennale Arte e Architettura.",
en:"Built in 1723 by Domenico Rossi for the Corner family, drawing inspiration from the nearby Ca\u2019 Pesaro designed by Baldassare Longhena. It was owned by Pope Pius VII from 1800, donated to the Congregation of the Cavanis Fathers in 1817, and subsequently housed the Monte di Piet\u00e0 until 1969, followed by ASAC \u2014 the Historical Archive of Contemporary Arts of the Venice Biennale \u2014 until 2010. In 2011 it was acquired by Fondazione Prada, which undertook a conservation restoration and opened its doors for temporary exhibitions coinciding with the Art and Architecture Biennale.",
fr:"Construit en 1723 par Domenico Rossi pour la famille Corner, en s\u2019inspirant du Ca\u2019 Pesaro voisin con\u00e7u par Baldassare Longhena. Il abrite jusqu\u2019en 1969 le Mont-de-Pi\u00e9t\u00e9, puis l\u2019ASAC \u2014 les Archives historiques des arts contemporains de la Biennale de Venise \u2014 jusqu\u2019en 2010. En 2011, la Fondazione Prada en fait l\u2019acquisition et ouvre ses portes pour des expositions temporaires lors de la Biennale d\u2019Art et d\u2019Architecture."},

{id:3,b:false,nome:'Palazzo Fortuny',fond:'Museo Civico MUVE',civ:'San Marco 3958 \u00b7 Campo San Beneto',vap:"Linea 1 \u00b7 Sant\u2019Angelo",sito:'fortuny.visitmuve.it',costo:'\u20ac',lat:45.43544777569157,lng:12.332308934672795,col:'#6D256E',
it:"Edificato tra il 1460 e il 1480 dal nobile Benedetto Pesaro, Palazzo Pesaro Orfei presenta una facciata, quella verso Campo San Beneto, tra le pi\u00f9 complesse e interessanti del gotico veneziano. Cambi\u00f2 proprietari nei secoli fino ad ospitare, dal 1898, il poliedrico artista spagnolo Mariano Fortuny y Madrazo \u2014 stilista, scenografo, fotografo e inventore \u2014 che ne acquis\u00ec man mano la propriet\u00e0, risollevandolo dal degrado in cui versava. Alla sua morte, nel 1949, la moglie don\u00f2 l\u2019edificio al Comune di Venezia, con il vincolo di farne un centro culturale. Dal 1975 \u00e8 museo civico, oggi parte della rete MUVE.",
en:"Built between 1460 and 1480 by the nobleman Benedetto Pesaro, Palazzo Pesaro Orfei boasts one of the most elaborate and compelling Gothic fa\u00e7ades in Venice, facing Campo San Beneto. From 1898 it welcomed the multifaceted Spanish artist Mariano Fortuny y Madrazo \u2014 designer, set designer, photographer and inventor \u2014 who gradually acquired the property and rescued it from neglect. Upon his death in 1949, his wife donated the building to the City of Venice on condition it become a cultural centre. Since 1975 it has been a civic museum, now part of the MUVE network.",
fr:"\u00c9difi\u00e9 entre 1460 et 1480 par le noble Benedetto Pesaro, le Palazzo Pesaro Orfei pr\u00e9sente l\u2019une des fa\u00e7ades gothiques les plus complexes de Venise. \u00c0 partir de 1898, il accueillit l\u2019artiste espagnol polyvalent Mariano Fortuny y Madrazo \u2014 styliste, sc\u00e9nographe, photographe et inventeur. \u00c0 sa mort en 1949, son \u00e9pouse fit don de l\u2019\u00e9difice \u00e0 la Ville de Venise. Mus\u00e9e civique depuis 1975, int\u00e9gr\u00e9 au r\u00e9seau MUVE."},

{id:4,b:false,nome:'Casa dei Tre Oci',fond:'Berggruen Institute Europe',civ:'Giudecca 43 \u00b7 Fondamenta Zitelle',vap:'Linee 2|4.1|4.2 \u00b7 Zitelle',sito:'berggruen.org/casa-dei-tre-oci',costo:'\u20ac',lat:45.42669228016944,lng:12.33844926991205,col:'#3A8C8C',
it:"Progettata nel 1912\u20131913 dal pittore bolognese Mario De Maria come abitazione-studio privata, le tre finestre ogivali simboleggiano i membri della sua famiglia, la pi\u00f9 piccola invece la figlia prematuramente morta. Dopo De Maria e per un breve periodo di Renzo Piano, la Fondazione di Venezia acquis\u00ec l\u2019edificio nel 2000 e, dopo un restauro, lo riapr\u00ec come spazio per mostre fotografiche. Nel 2021 il Nicolas Berggruen Charitable Trust ha acquistato l\u2019immobile, facendone la prima sede europea del Berggruen Institute \u2014 think-tank internazionale dedicato allo sviluppo di idee per le sfide globali del XXI secolo.",
en:"Designed in 1912\u20131913 by the Bolognese painter Mario De Maria as a private home and studio, the building\u2019s three ogival windows symbolize the members of his family \u2014 the smallest his daughter, who died prematurely. After De Maria and briefly Renzo Piano, the Fondazione di Venezia acquired the building in 2000 and reopened it as a space for photography exhibitions. In 2021 the Nicolas Berggruen Charitable Trust made it the first European home of the Berggruen Institute \u2014 an international think-tank dedicated to developing ideas for the global challenges of the 21st century.",
fr:"Con\u00e7ue en 1912\u20131913 par le peintre bolonais Mario De Maria comme r\u00e9sidence-atelier priv\u00e9e, les trois fen\u00eatres ogivales symbolisent les membres de sa famille \u2014 la plus petite sa fille, d\u00e9c\u00e9d\u00e9e pr\u00e9matur\u00e9ment. En 2021, le Nicolas Berggruen Charitable Trust en fit le premier si\u00e8ge europ\u00e9en du Berggruen Institute \u2014 think-tank international d\u00e9di\u00e9 au d\u00e9veloppement d\u2019id\u00e9es face aux d\u00e9fis mondiaux du XXIe si\u00e8cle."},

{id:5,b:false,nome:'Palazzo Diedo',fond:'Berggruen Arts & Culture',civ:'Cannaregio 2386 \u00b7 Fondamenta Trapolin',vap:'Linea 1|5.1 \u00b7 San Marcuola',sito:'palazzodiedo.it',costo:'\u2205 | \u20ac mostre temp.',lat:45.44358520523666,lng:12.331887241515807,col:'#837BB7',
it:"Costruito tra il 1710 e il 1720 su progetto dell\u2019architetto Andrea Tirali come residenza della famiglia Diedo, il palazzo di Cannaregio attraversa secoli di trasformazioni: dopo il fallimento della famiglia, il Comune di Venezia lo acquist\u00f2 nel 1889 destinandolo a scuola elementare e successivamente a sede del Tribunale di Sorveglianza. Dopo un decennio di abbandono, nel 2022 Nicolas Berggruen lo acquisisce per farne la sede di Berggruen Arts & Culture, polo dedicato all\u2019arte contemporanea in dialogo con le tradizioni artigianali veneziane. Aperto al pubblico nell\u2019aprile 2024, \u00e8 oggi il pi\u00f9 grande nuovo spazio espositivo aperto a Venezia nell\u2019ultimo decennio.",
en:"Built between 1710 and 1720 to a design by architect Andrea Tirali as the residence of the Diedo family, this Cannaregio palace has undergone centuries of transformation: following the family\u2019s bankruptcy, the City of Venice acquired it in 1889, using it first as a primary school and later as the seat of the Surveillance Tribunal. After a decade of abandonment, Nicolas Berggruen acquired it in 2022 to create the home of Berggruen Arts & Culture. Opened to the public in April 2024, it is today the largest new exhibition space to open in Venice in the past decade.",
fr:"Construit entre 1710 et 1720 sur les plans de l\u2019architecte Andrea Tirali, ce palais de Cannaregio a travers\u00e9 des si\u00e8cles de transformations. Apr\u00e8s une d\u00e9cennie d\u2019abandon, Nicolas Berggruen l\u2019acquiert en 2022 pour y installer Berggruen Arts & Culture. Ouvert au public en avril 2024, c\u2019est aujourd\u2019hui le plus grand nouvel espace d\u2019exposition inaugur\u00e9 \u00e0 Venise au cours de la derni\u00e8re d\u00e9cennie."},

{id:6,b:false,nome:'Palazzo Giustinian Lolin',fond:'Fondazione Vincenzo De Cotiis',civ:'San Marco 289',vap:'Linea 1|2 \u00b7 Accademia',sito:'vincentdecotiisfoundation.com',costo:'\u20ac',lat:45.43236601819184,lng:12.328545313846934,col:'#D4607A',
it:"L\u2019edificio risale al terzo decennio del Seicento, quando Giovanni Lolin commission\u00f2 la ristrutturazione del preesistente palazzo gotico al giovane Baldassarre Longhena, lasciandolo poi in eredit\u00e0 al nipote Giovanni Giustinian a condizione che ne conservasse il nome. Nel corso dell\u2019Ottocento ospitante la danzatrice Maria Taglioni e la duchessa Maria Luisa di Parma, prima di diventare dimora dei coniugi Ugo e Olga Levi, che ne fecero un raffinato salotto musicale e culturale. Nel 1962 nacque la Fondazione Ugo e Olga Levi, tuttora attiva negli studi musicali. Dal 19 aprile 2024, una parte del palazzo ospita la Fondazione Vincenzo De Cotiis \u2014 dedicata all\u2019arte contemporanea e al design, in dialogo con la storia dell\u2019edificio.",
en:"The building dates from the third decade of the 17th century, when Giovanni Lolin commissioned the young Baldassarre Longhena to restructure an existing Gothic palace. During the 19th century it hosted the dancer Maria Taglioni and Duchess Maria Luisa of Parma, before becoming the home of Ugo and Olga Levi, who turned it into a refined musical and cultural salon. In 1962 the Fondazione Ugo e Olga Levi was established. From 19 April 2024, part of the palace houses the Fondazione Vincenzo De Cotiis \u2014 dedicated to contemporary art and design in dialogue with the building\u2019s history.",
fr:"L\u2019\u00e9difice remonte \u00e0 la troisi\u00e8me d\u00e9cennie du XVIIe si\u00e8cle. Au XIXe si\u00e8cle, il accueillit la danseuse Maria Taglioni et la duchesse Maria Luisa de Parme, avant de devenir la demeure d\u2019Ugo et Olga Levi. La Fondazione Ugo e Olga Levi vit le jour en 1962. Depuis le 19 avril 2024, une partie du palais accueille la Fondazione Vincenzo De Cotiis \u2014 d\u00e9di\u00e9e \u00e0 l\u2019art contemporain et au design."},

{id:7,b:false,nome:'Palazzo Vendramin Grimani',fond:"Fondazione dell\u2019Albero d\u2019Oro",civ:'San Polo 2040',vap:'Linea 1 \u00b7 San Silvestro',sito:'fondazionealberodoro.org',costo:'\u20ac \u00b7 su prenotazione',lat:45.43629986845923,lng:12.3303692193197,col:'#8A1142',
it:"Nel 1449 Andrea e Luca Vendramin acquistarono una casa fondaco di forme bizantine a San Polo sul Canal Grande. Intorno al 1500 iniziarono i lavori all\u2019attuale facciata rinascimentale. I Grimani entrarono nella storia del palazzo nel 1517 tramite matrimonio con Elisabetta Vendramin, dando origine al ramo dei Grimani dell\u2019Albero d\u2019Oro, di cui Pietro fu Doge dal 1741 al 1752. Nel 2018 il palazzo fu acquisito da una societ\u00e0 fondiaria privata milanese. Oggi \u00e8 aperto al pubblico come museo e sede espositiva della Fondazione dell\u2019Albero d\u2019Oro, per la prima volta accessibile nella sua storia.",
en:"In 1449 Andrea and Luca Vendramin purchased a Byzantine-style merchant\u2019s house on the Canal Grande in San Polo. Around 1500 work began on the current Renaissance fa\u00e7ade. The Grimani family entered the palace\u2019s history in 1517 through the marriage of Elisabetta Vendramin, giving rise to the Grimani dell\u2019Albero d\u2019Oro branch, whose Pietro served as Doge from 1741 to 1752. In 2018 the palace was acquired by a Milanese private real estate company. It is now open to the public for the first time in its history as a museum and exhibition space of the Fondazione dell\u2019Albero d\u2019Oro.",
fr:"En 1449, Andrea et Luca Vendramin acqui\u00e8rent une maison-entrep\u00f4t de style byzantin sur le Canal Grande. La famille Grimani entra dans l\u2019histoire du palais en 1517 par le mariage d\u2019Elisabetta Vendramin, dont Pietro fut Doge de 1741 \u00e0 1752. Il est aujourd\u2019hui ouvert au public pour la premi\u00e8re fois de son histoire, comme mus\u00e9e et espace d\u2019exposition de la Fondazione dell\u2019Albero d\u2019Oro."},

{id:8,b:false,nome:'Fondazione Querini Stampalia',fond:'Museo \u00b7 Biblioteca \u00b7 Centro Culturale',civ:'Castello 5252 \u00b7 Campo Santa Maria Formosa',vap:'Linea 1|2 \u00b7 Rialto | San Zaccaria',sito:'querinistampalia.org',costo:'\u20ac',lat:45.436733962220664,lng:12.341389475515223,col:'#9B0552',
nota:{it:"La Querini Stampalia non \u00e8 solo un museo. \u00c8 una delle biblioteche pubbliche pi\u00f9 frequentate di Venezia \u2014 aperta fino a tardi e nei giorni festivi, con oltre 400.000 volumi e varie collezioni ed archivi a disposizione. Considerata la \u00abbiblioteca dei veneziani\u00bb, \u00e8 accessibile gratuitamente a chiunque abbia pi\u00f9 di 16 anni. \u00c8 uno dei luoghi di partenza della prossima guida della collana: Tra i Libri.",en:"Querini Stampalia is not just a museum. It is one of Venice\u2019s most frequented public libraries \u2014 open late and on public holidays, with over 400,000 volumes. Known as \u2018the Venetians\u2019 library\u2019, it is freely accessible to anyone over 16. One of the starting points for the next guide in the collection: Among Books.",fr:"La Querini Stampalia n\u2019est pas seulement un mus\u00e9e. C\u2019est l\u2019une des biblioth\u00e8ques publiques les plus fr\u00e9quent\u00e9es de Venise \u2014 ouverte jusqu\u2019au soir et les jours f\u00e9ri\u00e9s, avec plus de 400 000 volumes. Connue comme \u00abla biblioth\u00e8que des V\u00e9nitiens\u00bb, accessible gratuitement \u00e0 toute personne de plus de 16 ans. L\u2019un des points de d\u00e9part du prochain guide\u00a0: Entre les Livres."},
it:"Il palazzo cinquecentesco affacciato sull\u2019acqua nel sestiere di Castello ospita una delle istituzioni culturali pi\u00f9 longeve d\u2019Italia. La sua storia \u00e8 legata all\u2019ultimo discendente della famiglia, il conte Giovanni, che nel 1868 lasci\u00f2 in eredit\u00e0 alla citt\u00e0 di Venezia l\u2019intero patrimonio familiare \u2014 collezioni artistiche, librarie e immobili. Nei decenni successivi gli spazi interni furono trasformati da interventi architettonici di Carlo Scarpa, Valeriano Pastor, Mario Botta e Michele De Lucchi, che convivono con gli ambienti originali della dimora nobiliare. Oggi \u00e8 museo, biblioteca pubblica, spazio espositivo e centro culturale attivo tutto l\u2019anno.",
en:"This 16th-century palace overlooking the water in the Castello sestiere is home to one of Italy\u2019s longest-established cultural institutions. Its story is bound to Count Giovanni, who in 1868 bequeathed the entire family heritage to the City of Venice so that it might become available to the public. Over the following decades the interiors were reshaped by architectural interventions from Carlo Scarpa, Valeriano Pastor, Mario Botta and Michele De Lucchi. Today it functions as a museum, public library, exhibition space and cultural centre active throughout the year.",
fr:"Ce palais du XVIe si\u00e8cle, ouvert sur l\u2019eau dans le sestiere de Castello, abrite l\u2019une des institutions culturelles les plus anciennes d\u2019Italie. Le comte Giovanni l\u00e9gua en 1868 \u00e0 la Ville de Venise l\u2019int\u00e9gralit\u00e9 du patrimoine familial. Les espaces int\u00e9rieurs furent transform\u00e9s par des interventions de Carlo Scarpa, Valeriano Pastor, Mario Botta et Michele De Lucchi. Aujourd\u2019hui mus\u00e9e, biblioth\u00e8que publique, espace d\u2019exposition et centre culturel actif toute l\u2019ann\u00e9e."},

{id:9,b:false,nome:'Palazzo Gradenigo',fond:'G\u00fcne\u015ftekin Art Refinery',civ:'Castello 2838 \u00b7 Campo Santa Giustina',vap:'Linea 5.1|5.2 \u00b7 Ospedale',sito:'ahmetgunestekin.com',costo:'\u2205',lat:45.43791377469049,lng:12.345970994231555,col:'#7B4FA6',
it:"Di origine seicentesca, nel sestiere di Castello, la sua costruzione \u00e8 attribuita a Taddeo Gradenigo (1516\u20131576). Dopo secoli di storia nobiliare, il palazzo era rimasto chiuso al pubblico per 17 anni, prima come sede degli uffici comunali informatici, poi passato alla Cassa Depositi e Prestiti. Nel 2024 l\u2019artista curdo-turco Ahmet G\u00fcne\u015ftekin lo ha acquisito per circa 10 milioni di euro e ne ha avviato un restauro conservativo. Inaugurata il 6 maggio 2026 in coincidenza con la Biennale Arte, \u00e8 oggi la sede veneziana della G\u00fcne\u015ftekin Art Refinery \u2014 terza sede dopo Istanbul e Urla \u2014 dedicata a mostre, residenze e formazione di giovani artisti.",
en:"Of 17th-century origin in the Castello sestiere, its construction is attributed to Taddeo Gradenigo (1516\u20131576). After centuries of noble history, the palace remained closed to the public for 17 years. In 2024 the Kurdish-Turkish artist Ahmet G\u00fcne\u015ftekin acquired it for approximately 10 million euros. Inaugurated on 6 May 2026 to coincide with the Art Biennale, it is now the Venetian home of the G\u00fcne\u015ftekin Art Refinery \u2014 dedicated to exhibitions, residencies and the training of young artists.",
fr:"D\u2019origine XVIIe si\u00e8cle dans le sestiere de Castello, sa construction est attribu\u00e9e \u00e0 Taddeo Gradenigo (1516\u20131576). En 2024, l\u2019artiste kurdo-turc Ahmet G\u00fcne\u015ftekin l\u2019a acquis pour environ 10 millions d\u2019euros. Inaugur\u00e9 le 6 mai 2026, il est aujourd\u2019hui le si\u00e8ge v\u00e9nitien de la G\u00fcne\u015ftekin Art Refinery \u2014 d\u00e9di\u00e9 aux expositions, r\u00e9sidences et \u00e0 la formation de jeunes artistes."},

{id:10,b:false,nome:'Palazzo Manfrin',fond:'Anish Kapoor Foundation',civ:'Cannaregio 342',vap:'Linea 1 \u00b7 San Marcuola',sito:'anishkapoor.com',costo:'\u2205',lat:45.44389693139039,lng:12.324925717359802,col:'#4F1154',
it:"Edificato nella prima met\u00e0 del Cinquecento, fu dapprima fatto ampliare da Federico Venier su progetto di Andrea Tirali nel 1734, successivamente acquistato da Girolamo Manfrin nel 1788, che lo trasform\u00f2 in una delle gallerie d\u2019arte private pi\u00f9 famose d\u2019Europa: Antonio Canova, Lord Byron, John Ruskin e \u00c9douard Manet vi misero piede, attratti da una collezione di sculture, opere e libri che alla morte del conte conflui\u00ec in parte alle Gallerie dell\u2019Accademia \u2014 portando in dote capolavori di Giorgione, Mantegna e Memling. Dopo decenni di abbandono, nel 2021 Anish Kapoor lo acquista e affida il restauro all\u2019architetta Giulia Foscari (UNA / FWR Associati). Dal 5 maggio 2026 \u00e8 sede permanente della Anish Kapoor Foundation.",
en:"Built in the first half of the 16th century, the palace was extended by Federico Venier in 1734, then acquired by Girolamo Manfrin in 1788, who transformed it into one of the most celebrated private art galleries in Europe \u2014 visited by Canova, Byron, Ruskin and Manet. After the count\u2019s death part of the collection passed to the Gallerie dell\u2019Accademia, including masterpieces by Giorgione, Mantegna and Memling. Anish Kapoor acquired it in 2021 and entrusted the restoration to architect Giulia Foscari (UNA / FWR Associati). Since 5 May 2026 it is the permanent home of the Anish Kapoor Foundation.",
fr:"\u00c9difi\u00e9 dans la premi\u00e8re moiti\u00e9 du XVIe si\u00e8cle, agrandi par Federico Venier en 1734, puis acquis par Girolamo Manfrin en 1788, qui le transforma en l\u2019une des galeries d\u2019art priv\u00e9es les plus c\u00e9l\u00e8bres d\u2019Europe \u2014 visit\u00e9e par Canova, Byron, Ruskin et Manet. Depuis le 5 mai 2026, il est le si\u00e8ge permanent de la Anish Kapoor Foundation."},

{id:11,b:false,nome:'Palazzetto Tito',fond:'Fondazione Bevilacqua La Masa',civ:'Dorsoduro 2826',vap:"Linea 1 \u00b7 Ca\u2019 Rezzonico | Linea 2|5.1|5.2|6 \u00b7 San Basilio",sito:'bevilacqualamasa.it',costo:'\u2205',lat:45.43303825108136,lng:12.323946973431891,col:'#84164E',
nota:{it:"Due fondazioni, una accanto all\u2019altra, con storie e missioni speculari \u2014 una secolare e pubblica, l\u2019altra appena nata e privata, ma con l\u2019obiettivo comune di mantenere vivi i palazzi veneziani e raccontare la storia di chi li ha abitati con occhi di oggi.",en:"Two foundations, side by side, with mirroring stories and missions \u2014 one century-old and public, the other newly born and private, but with the shared ambition of keeping Venetian palaces alive and telling the stories of those who inhabited them through a contemporary eye.",fr:"Deux fondations, l\u2019une \u00e0 c\u00f4t\u00e9 de l\u2019autre, avec des histoires et des missions en miroir \u2014 l\u2019une s\u00e9culaire et publique, l\u2019autre tout juste n\u00e9e et priv\u00e9e, mais avec l\u2019ambition commune de maintenir vivants les palais v\u00e9nitiens et de raconter l\u2019histoire de ceux qui les ont habit\u00e9s avec un regard d\u2019aujourd\u2019hui."},
it:"Il Palazzetto Tito prende il nome dai fratelli Ettore e Luigi Tito, pittori veneziani che lo abitarono a cavallo tra Otto e Novecento trasformandolo in un vivace ritrovo per artisti, musicisti e scrittori \u2014 tanto che Luigi ne disegn\u00f2 i fregi della facciata. La Fondazione Bevilacqua La Masa affonda le radici nel 1898, quando la duchessa Felicita Bevilacqua lasci\u00f2 in eredit\u00e0 al Comune di Venezia il palazzo di Ca\u2019 Pesaro con una condizione precisa: doveva diventare uno spazio a favore dei giovani artisti \u00abai quali \u00e8 spesso interdetto l\u2019ingresso nelle grandi mostre\u00bb. Da quell\u2019atto di lungimiranza sono passati per la Fondazione Boccioni, Casorati, Arturo Martini. Oggi \u00e8 l\u2019istituzione pubblica pi\u00f9 longeva d\u2019Italia dedicata ai giovani artisti.",
en:"Palazzetto Tito takes its name from the brothers Ettore and Luigi Tito, Venetian painters who lived here around the turn of the 20th century \u2014 Luigi even designed the decorative friezes on the fa\u00e7ade. The Fondazione Bevilacqua La Masa traces its roots to 1898, when Duchess Felicita Bevilacqua bequeathed the palazzo of Ca\u2019 Pesaro to the City of Venice on one condition: it was to become a space for young artists \u2018so often denied access to the great exhibitions.\u2019 That act of foresight gave early opportunities to Boccioni, Casorati and Arturo Martini. Today it is Italy\u2019s longest-established public institution dedicated to emerging artists.",
fr:"Le Palazzetto Tito doit son nom aux fr\u00e8res Ettore et Luigi Tito, peintres v\u00e9nitiens \u2014 Luigi en dessina m\u00eame les frises d\u00e9coratives de la fa\u00e7ade. La Fondazione Bevilacqua La Masa trouve ses origines en 1898, lorsque la duchesse Felicita Bevilacqua l\u00e9gua au Comune di Venezia le palais Ca\u2019 Pesaro pour en faire un espace pour les jeunes artistes. Cet acte visionnaire permit \u00e0 des artistes comme Boccioni, Casorati et Arturo Martini de faire leurs premi\u00e8res armes."},

{id:12,b:false,nome:'Palazzo Tito \u00b7 Fiorucci Foundation',fond:'Nicoletta Fiorucci Foundation',civ:'Dorsoduro 2829',vap:"Linea 1 \u00b7 Ca\u2019 Rezzonico | Linea 2|5.1|5.2|6 \u00b7 San Basilio",sito:'nf.foundation',costo:'\u2205',lat:45.43302503975556,lng:12.323594103249759,col:'#9B7CC4',
it:"L\u2019edificio al numero 2829 di Dorsoduro ha origini quattrocentesche, quando era tra i fondi del Priorato di Sant\u2019Agnese, sede di un ospizio per fanciulle orfane. Trasformato in pi\u00f9 fasi tra il 1924 e il 1937 su progetto di Angelo Scattolin, divenne poi ambulatorio per i lavoratori portuali della Cassa Marittima Adriatica. Nel 1923 era gi\u00e0 stato abitato dal pittore Ettore Tito, il cui studio si trovava accanto alla dimora di famiglia \u2014 il Palazzetto Tito oggi sede della Fondazione Bevilacqua La Masa. La Nicoletta Fiorucci Foundation ha inaugurato qui la sua sede veneziana nel maggio 2025, affidando la prima installazione all\u2019artista georgiana Tolia Astakhishvili, curata da Hans Ulrich Obrist. Uno spazio che porta su di s\u00e9 cinque secoli di stratificazioni \u2014 e li mostra tutti.",
en:"The building at Dorsoduro 2829 has 15th-century origins as part of the Priory of Sant\u2019Agnese, which ran a hospice for orphaned girls. Transformed between 1924 and 1937 to a design by Angelo Scattolin, it later became a medical clinic for dock workers. In 1923 it had already been inhabited by the painter Ettore Tito, whose studio stood adjacent to the Palazzetto Tito. The Nicoletta Fiorucci Foundation inaugurated its Venetian home here in May 2025, with an opening installation by Georgian artist Tolia Astakhishvili, curated by Hans Ulrich Obrist. A space that bears five centuries of layered history \u2014 and makes no attempt to conceal them.",
fr:"L\u2019\u00e9difice au num\u00e9ro 2829 du Dorsoduro a des origines du XVe si\u00e8cle. Transform\u00e9 entre 1924 et 1937 selon les plans d\u2019Angelo Scattolin, il devint ensuite un dispensaire pour les travailleurs portuaires. En 1923, il avait d\u00e9j\u00e0 \u00e9t\u00e9 habit\u00e9 par le peintre Ettore Tito. La Nicoletta Fiorucci Foundation a inaugur\u00e9 ici son si\u00e8ge v\u00e9nitien en mai 2025, avec une installation de l\u2019artiste g\u00e9orgienne Tolia Astakhishvili, commissionn\u00e9e par Hans Ulrich Obrist."},

{id:13,b:true,nome:'Palazzina Masieri',fond:'Fondazione Angelo Masieri \u00b7 IUAV',civ:'Dorsoduro 3900',vap:'Linea 1|2 \u00b7 San Tom\u00e0',sito:'masieri.org',costo:'\u2205 \u00b7 su appuntamento: fondazionemasieri@iuav.it',lat:45.43494691625871,lng:12.326819408307328,col:'#2A6B8B',
nota:{it:"La Palazzina Masieri non \u00e8 solo una fondazione, un memoriale. \u00c8 un luogo dove l\u2019architettura del Novecento ha lasciato a Venezia la sua traccia pi\u00f9 silente, ma pi\u00f9 densa, dove il non costruito acquista ancora pi\u00f9 significato, e memoria: Wright, una famiglia che insegue un desiderio, una citt\u00e0 che dice no, la maestria di Scarpa che lo reinterpreta sottovoce. \u00c8 da questa storia che nasce il prossimo titolo della collana: Nel Contemporaneo.",en:"Palazzina Masieri is not just a foundation, a memorial. It is a place where 20th-century architecture left its most silent yet most dense trace in Venice \u2014 where the unbuilt carries even greater weight, and memory: Wright, a family pursuing a dream, a city that says no, the mastery of Scarpa who reinterprets it in a whisper. It is from this story that the next title in the collection is born: Nel Contemporaneo.",fr:"La Palazzina Masieri n\u2019est pas seulement une fondation, un m\u00e9morial. C\u2019est un lieu o\u00f9 l\u2019architecture du XXe si\u00e8cle a laiss\u00e9 \u00e0 Venise sa trace la plus silencieuse mais la plus dense \u2014 l\u00e0 o\u00f9 le non-construit prend encore plus de sens\u00a0: Wright, une famille qui poursuit un d\u00e9sir, une ville qui dit non, la ma\u00eetrise de Scarpa. C\u2019est de cette histoire que na\u00eet le prochain titre de la collection\u00a0: Nel Contemporaneo."},
it:"La prima proposta di riforma dell\u2019edificio pre-ottocentesco venne redatta da Frank Lloyd Wright, da cui il giovane architetto veneziano Angelo Masieri si stava recando quando mor\u00ec in un tragico incidente d\u2019auto. La famiglia decise comunque di affidare a Wright il progetto, trasformandolo da casa privata in un Memoriale. Il progetto suscit\u00f2 polemiche accese e venne bloccato. Nel 1968 fu incaricato Carlo Scarpa, con il mandato di ridisegnare l\u2019interno, mantenendo la facciata; l\u2019edificio fu completato nel marzo 1983. Nella primavera 2024, dopo un lungo periodo di chiusura, la palazzina ha riaperto le porte a seguito di importanti lavori di riqualificazione promossi dall\u2019Universit\u00e0 IUAV di Venezia.",
en:"The first proposal to renovate this pre-19th-century building was drawn up by Frank Lloyd Wright \u2014 the very architect the young Venetian Angelo Masieri was travelling to meet when he died in a tragic car accident. The family nonetheless decided to entrust Wright with the project, transforming it from a private home into a Memorial. The design sparked fierce controversy and was ultimately blocked. In 1968 Carlo Scarpa was commissioned to redesign the interior while preserving the fa\u00e7ade; the building was completed in March 1983. In spring 2024 the palazzina reopened following refurbishment works promoted by the IUAV University of Venice.",
fr:"La premi\u00e8re proposition de r\u00e9novation de cet \u00e9difice pr\u00e9-XIXe si\u00e8cle fut con\u00e7ue par Frank Lloyd Wright \u2014 l\u2019architecte que le jeune V\u00e9nitien Angelo Masieri allait rejoindre lorsqu\u2019il trouva la mort dans un tragique accident de voiture. La famille d\u00e9cida de confier le projet \u00e0 Wright, le transformant d\u2019une maison priv\u00e9e en un M\u00e9morial. En 1968, Carlo Scarpa fut charg\u00e9 de redessiner l\u2019int\u00e9rieur tout en pr\u00e9servant la fa\u00e7ade\u00a0; l\u2019\u00e9difice fut achev\u00e9 en mars 1983."},

{id:14,b:true,nome:'Palazzo Erizzo Nani Mocenigo Ligabue',fond:'Fondazione Giancarlo Ligabue',civ:'San Marco 3319',vap:'Linea 1|2 \u00b7 San Samuele',sito:'fondazioneligabue.it',costo:'\u2205',lat:45.434601530077934,lng:12.32771752179578,col:'#4C9892',
nota:{it:"La Fondazione Ligabue non \u00e8 solo un palazzo sul Canal Grande. Con la sua collezione che attraversa 4,5 miliardi di anni \u2014 dai meteoriti all\u2019arte contemporanea \u2014 \u00e8 forse il luogo pi\u00f9 adatto di Venezia per avvicinare i pi\u00f9 giovani alla storia dell\u2019umanit\u00e0. Dal 2019 il Museo di Storia Naturale porta il nome di Giancarlo Ligabue. \u00c8 uno dei luoghi da non perdere nella prossima guida della collana: In Campo.",en:"The Fondazione Ligabue is not just a palace on the Canal Grande. With its collection spanning 4.5 billion years \u2014 from meteorites to contemporary art \u2014 it is perhaps the most fitting place in Venice to introduce younger visitors to the history of humanity. Since 2019 the Natural History Museum has borne the name of Giancarlo Ligabue. One of the unmissable destinations in the next volume: In Campo.",fr:"La Fondazione Ligabue n\u2019est pas seulement un palais sur le Canal Grande. Avec sa collection qui traverse 4,5 milliards d\u2019ann\u00e9es, c\u2019est peut-\u00eatre le lieu le plus appropri\u00e9 de Venise pour initier les plus jeunes \u00e0 l\u2019histoire de l\u2019humanit\u00e9. Depuis 2019, le Mus\u00e9e d\u2019Histoire Naturelle porte le nom de Giancarlo Ligabue. L\u2019un des lieux incontournables du prochain volume\u00a0: In Campo."},
it:"Costruito alla fine del Quattrocento dalla famiglia Da Lezze in stile gotico sul Canal Grande, il palazzo pass\u00f2 nel corso dei secoli agli Erizzo e poi ai Nani Mocenigo, prima di essere acquistato nel secondo dopoguerra da Anacleto Ligabue. \u00c8 oggi al tempo stesso sede istituzionale, casa di famiglia e \u2014 dal 7 maggio 2026 \u2014 Palazzo delle Arti e delle Culture. La Fondazione Giancarlo Ligabue nasce nel 2016 per dare continuit\u00e0 al Centro Studi fondato nel 1973 dal paleontologo e imprenditore Giancarlo Ligabue, che in quarant\u2019anni promosse 130 spedizioni scientifiche in tutti i continenti. Con Collecto, la collezione di oltre 400 opere e reperti \u2014 da un meteorite di 4,5 miliardi di anni all\u2019arte contemporanea \u2014 \u00e8 finalmente accessibile al pubblico.",
en:"Built at the end of the 15th century by the Da Lezze family in Gothic style on the Canal Grande, the palace passed over the centuries to the Erizzo and then the Nani Mocenigo families, before being acquired after World War II by Anacleto Ligabue. The Fondazione Giancarlo Ligabue was established in 2016 to carry forward the Centro Studi founded in 1973 by palaeontologist Giancarlo Ligabue, who over four decades led 130 scientific expeditions. With Collecto, a collection of over 400 works and artefacts \u2014 from a 4.5 billion-year-old meteorite to contemporary art \u2014 is finally open to the public.",
fr:"Construit \u00e0 la fin du XVe si\u00e8cle par la famille Da Lezze dans un style gothique sur le Canal Grande, le palais est aujourd\u2019hui \u00e0 la fois si\u00e8ge institutionnel, demeure familiale et Palazzo delle Arti e delle Culture. La Fondazione Giancarlo Ligabue a \u00e9t\u00e9 cr\u00e9\u00e9e en 2016 pour perp\u00e9tuer le Centro Studi fond\u00e9 en 1973 par Giancarlo Ligabue, qui en quarante ans mena 130 exp\u00e9ditions scientifiques. Avec Collecto, une collection de plus de 400 \u0153uvres est enfin accessible au public."},

{id:15,b:true,nome:'Fondaco degli Angeli',fond:'Fondazione Wilmotte',civ:'Cannaregio 3560',vap:"Linea 4.1|4.2|5.1|5.2 \u00b7 Madonna dell\u2019Orto (~8min) | Linea 1|2 \u00b7 San Marcuola (~8min)",sito:'wilmotte.com/en/foundation-w',costo:'\u2205',lat:45.44458602105154,lng:12.334308939441485,col:'#CFA6B2',
nota:{it:"Il Fondaco degli Angeli non \u00e8 un palazzo nobiliare \u2014 \u00e8 un\u2019ex officina navale. La sua storia appartiene a un\u2019altra Venezia, quella produttiva e artigianale. \u00c8 di questi edifici, alcuni dei quali davvero straordinari, che parla il volume \u201cIn Cantiere\u201d della collana di guide LOVENICE.",en:"The Fondaco degli Angeli is not a noble palace \u2014 it is a former shipyard workshop. Its story belongs to a different Venice, the productive and artisanal one. It is precisely these buildings, some of them truly extraordinary, that the LOVENICE guide In Cantiere is about.",fr:"Le Fondaco degli Angeli n\u2019est pas un palais noble \u2014 c\u2019est une ancienne chantier naval. Son histoire appartient \u00e0 une autre Venise, celle de la production et de l\u2019artisanat. Ce sont pr\u00e9cis\u00e9ment ces \u00e9difices que raconte le volume In Cantiere de la collection de guides LOVENICE."},
it:"Ex officina navale di fine Ottocento, poi laboratorio di falegnameria e scuola professionale, il Fondaco degli Angeli \u00e8 uno spazio tipicamente veneziano nel cuore di Cannaregio: due accessi indipendenti, uno da terra attraverso il giardino sotto l\u2019arco di Santa Maria della Misericordia, uno dall\u2019acqua sulla Sacca della Misericordia verso la laguna nord. Dopo due anni e mezzo di restauro, ha riaperto nell\u2019agosto 2012 come galleria della Fondazione Wilmotte, creata nel 2005 dall\u2019architetto francese Jean-Michel Wilmotte per promuovere il cosiddetto \u00abinnesto contemporaneo\u00bb \u2014 il recupero di edifici storici attraverso l\u2019aggiunta di elementi contemporanei. Ospita il Prix W, concorso biennale per giovani talenti dell\u2019architettura. Programmazione discontinua: verificare il sito prima della visita.",
en:"A former late-19th-century boat repair workshop, later a carpentry and vocational school, the Fondaco degli Angeli is a typically Venetian space in the heart of Cannaregio: two independent entrances, one from land through the garden beneath the arch of Santa Maria della Misericordia, one from the water on the Sacca della Misericordia. It reopened in August 2012 as the gallery of the Fondazione Wilmotte, established by French architect Jean-Michel Wilmotte to promote the \u2018contemporary graft\u2019 \u2014 the restoration of historic buildings through the addition of contemporary elements. It hosts the Prix W, a biennial competition for young architectural talent. Irregular programming: check the website before visiting.",
fr:"Ancienne chantier naval de la fin du XIXe si\u00e8cle, le Fondaco degli Angeli est un espace typiquement v\u00e9nitien au c\u0153ur du Cannaregio\u00a0: deux entr\u00e9es ind\u00e9pendantes, l\u2019une depuis la terre \u00e0 travers le jardin sous l\u2019arche de Santa Maria della Misericordia, l\u2019autre depuis l\u2019eau sur la Sacca della Misericordia. Il a rouvert en ao\u00fbt 2012 comme galerie de la Fondazione Wilmotte. Il accueille le Prix W, concours biennal pour jeunes talents de l\u2019architecture. Programmation irr\u00e9guli\u00e8re\u00a0: v\u00e9rifier le site avant la visite."}
];



var map=L.map('map',{center:[45.437,12.335],zoom:14,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'\u00a9 OpenStreetMap \u00b7 \u00a9 CARTO',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

var MK={};

function popup(p){
  var u=UI[lang];
  var cc=p.costo==='\u2205'?'cf':p.costo.indexOf('\u2205')>=0?'cm':'cp';
  var col=p.col;
  var nb=p.nota?'<div class="pnote" style="border-left:2px solid '+col+';background:'+col+'18;">'+
    '<strong style="color:'+col+';">'+u.note+'</strong>'+p.nota[lang]+'</div>':'';
  var bb=p.b?'<div class="pbadge" style="border:1px dashed '+col+';color:'+col+';">Apertura stra-ordinaria</div>':'';
  return '<div class="pw">'
    +bb
    +'<div class="ph" style="border-bottom-color:'+col+'40;">'
    +'<div><img src="'+(p.b?(ICONS_NEG[p.col]||ICONS[p.col]):ICONS[p.col])+'" width="28" height="28" style="display:block;"/></div>'
    +'<div class="pht"><h3 style="color:'+col+';">'+p.nome+'</h3>'
    +'<div class="pf" style="color:'+col+';">'+p.fond+'</div></div></div>'
    +'<div class="ptxt">'+p[lang]+'</div>'
    +'<div class="pinfo">'
    +'<div class="pir"><span class="l" style="color:'+col+';">'+u.addr+'</span><span>'+p.civ+'</span></div>'
    +'<div class="pir"><span class="l" style="color:'+col+';">&#x26F4;</span><span>'+p.vap+'</span></div>'
    +'<div class="pir"><span class="l" style="color:'+col+';">'+u.web+'</span><a href="https://'+p.sito+'" target="_blank" style="color:'+col+';">'+p.sito+'</a></div>'
    +'<div class="pir"><span class="l" style="color:'+col+';">'+u.acc+'</span><span class="'+cc+'">'+p.costo+'</span></div>'
    +'</div>'+nb+'</div>';
}

P.forEach(function(p){
  var icon=makeIcon(p.col, p.b);
  var m=L.marker([p.lat,p.lng],{icon:icon}).addTo(map);
  m.bindPopup('',{maxWidth:300});
  m.on('click',function(){
    m.setPopupContent(popup(p));
    document.querySelectorAll('.pi').forEach(function(el){el.classList.remove('active');});
    var el=document.querySelector('[data-id="'+p.id+'"]');
    if(el)el.classList.add('active');
  });
  MK[p.id]=m;
});

function buildSidebar(){
  var pl=document.getElementById('plist'),bl=document.getElementById('blist');
  pl.innerHTML='';bl.innerHTML='';
  P.forEach(function(p){
    var d=document.createElement('div');
    d.className='pi'+(p.b?' bonus':'');
    d.setAttribute('data-id',p.id);
    d.innerHTML='<div class="pic"><img src="'+(p.b?(ICONS_NEG[p.col]||ICONS[p.col]):ICONS[p.col])+'" width="24" height="24" style="display:block;"/></div><div class="pii"><h3>'+p.nome+'</h3><span>'+p.civ+'</span></div>';
    d.addEventListener('click',function(){
      map.setView([p.lat,p.lng],16,{animate:true});
      var m=MK[p.id];
      m.setPopupContent(popup(p));
      m.openPopup();
      document.querySelectorAll('.pi').forEach(function(el){el.classList.remove('active');});
      d.classList.add('active');
    });
    (p.b?bl:pl).appendChild(d);
  });
}

function setLang(l){
  lang=l;
  document.querySelectorAll('.lb').forEach(function(b){b.classList.remove('active');});
  document.querySelector('.lb[onclick="setLang(\''+l+'\')"]').classList.add('active');
  var u=UI[l];
  document.getElementById('sbt').textContent=u.title;
  document.getElementById('sbs').textContent=u.sub;
  document.getElementById('sml').textContent=u.ml;
  document.getElementById('sbl').textContent=u.bl;
  Object.keys(MK).forEach(function(id){
    var m=MK[id];
    if(m.isPopupOpen()){var p=P.find(function(x){return x.id===parseInt(id);});if(p)m.setPopupContent(popup(p));}
  });
}

function toggleSidebar(){
  var s=document.getElementById('sidebar');
  var o=document.getElementById('overlay');
  s.classList.toggle('open');
  o.classList.toggle('open');
}
function closeSidebar(){
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}

buildSidebar();
</script>
</body>
</html>
