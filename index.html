<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LOVENICE — Guide di Venezia</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root{--borgogna:#69003A;--viola:#5B2A8B;--lavanda:#9B7CC4;--nero:#1A1018;--panna:#F8F4F0;--carta:#FAF7F2;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Josefin Sans',sans-serif;background:var(--nero);color:var(--panna);height:100vh;display:flex;flex-direction:column;overflow:hidden;}

header{background:var(--nero);padding:10px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(155,124,196,0.25);flex-shrink:0;z-index:1000;}
.logo{display:flex;align-items:baseline;gap:10px;}
.lt{font-size:20px;font-weight:600;letter-spacing:.25em;}
.lt .L{color:#8B1A4A}.lt .O{color:#B5224F}.lt .V{color:#5B2A8B}.lt .E{color:#7B4FA6}.lt .N{color:#8B1A4A}.lt .I{color:#9B7CC4}.lt .CE{color:#C4A0D4}
.ls{font-family:'Cormorant Garamond',serif;font-style:italic;font-size:13px;color:var(--lavanda);}
.buy-btn{padding:7px 18px;font-size:9px;letter-spacing:.18em;text-transform:uppercase;cursor:pointer;border:none;background:var(--borgogna);color:white;font-family:'Josefin Sans',sans-serif;text-decoration:none;transition:all .2s;}
.buy-btn:hover{background:#8B1A4A;}

#map{flex:1;z-index:1;}

/* LEGEND PANEL */
.legend{position:fixed;right:0;top:57px;bottom:0;width:260px;background:rgba(26,16,24,0.95);border-left:1px solid rgba(155,124,196,.2);z-index:500;display:flex;flex-direction:column;overflow:hidden;transition:transform .3s;}
.legend-header{padding:14px 16px 10px;border-bottom:1px solid rgba(155,124,196,.1);}
.legend-header h2{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:300;}
.legend-header p{font-size:8px;letter-spacing:.14em;color:var(--lavanda);margin-top:3px;text-transform:uppercase;}
.legend-section{font-size:8px;letter-spacing:.2em;text-transform:uppercase;color:rgba(155,124,196,.4);padding:8px 16px 4px;}
.legend-list{overflow-y:auto;flex:1;}
.legend-list::-webkit-scrollbar{width:2px;}
.legend-list::-webkit-scrollbar-thumb{background:var(--viola);}
.li{padding:7px 16px;cursor:pointer;border-left:3px solid transparent;transition:all .2s;display:flex;align-items:center;gap:8px;}
.li:hover{background:rgba(155,124,196,.07);}
.li.active{background:rgba(155,124,196,.1);border-left-color:var(--lavanda);}
.li-icon{flex-shrink:0;width:20px;height:20px;}
.li-info h3{font-family:'Cormorant Garamond',serif;font-size:12px;font-weight:400;line-height:1.2;color:var(--panna);}
.li-info span{font-size:7px;letter-spacing:.1em;color:rgba(248,244,240,0.55);}
.li.coming .li-info h3{color:rgba(248,244,240,.45);}
.li.coming .li-info span{color:rgba(248,244,240,.3);}

/* TOGGLE */
.legend-toggle{display:none;position:fixed;bottom:24px;right:16px;z-index:999;background:var(--borgogna);border:none;border-radius:50%;width:48px;height:48px;cursor:pointer;box-shadow:0 4px 16px rgba(0,0,0,.5);align-items:center;justify-content:center;}
.legend-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:499;}

/* POPUP */
.leaflet-popup-content-wrapper{background:var(--carta)!important;border:1px solid rgba(155,124,196,.3)!important;border-radius:2px!important;box-shadow:0 8px 32px rgba(0,0,0,.4)!important;color:#2A2030!important;max-width:260px!important;}
.leaflet-popup-tip{background:var(--carta)!important;}
.leaflet-popup-close-button{color:#9B7CC4!important;}
.pw{font-family:'Josefin Sans',sans-serif;}
.ph{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px;padding-bottom:8px;border-bottom:1px solid rgba(155,124,196,.2);}
.pht h3{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:400;line-height:1.2;margin-bottom:2px;}
.pf{font-size:8px;letter-spacing:.1em;text-transform:uppercase;opacity:.7;}
.paddr{font-size:9px;color:#4A3D50;margin-bottom:10px;line-height:1.5;}
.pbtn{display:block;width:100%;padding:8px;text-align:center;font-size:9px;letter-spacing:.18em;text-transform:uppercase;font-family:'Josefin Sans',sans-serif;text-decoration:none;border:none;cursor:pointer;margin-bottom:6px;}
.pbtn-buy{background:var(--borgogna);color:white;}
.pbtn-buy:hover{background:#8B1A4A;}
.pbtn-map{background:transparent;border:1px solid rgba(155,124,196,.4);color:#7B4FA6;}
.pbtn-map:hover{background:rgba(155,124,196,.1);}
.pcoming{text-align:center;padding:8px;font-size:9px;color:rgba(155,124,196,.7);letter-spacing:.1em;text-transform:uppercase;border:1px dashed rgba(155,124,196,.3);}
.pcoming-guide{font-family:'Cormorant Garamond',serif;font-size:13px;font-style:italic;color:#7B4FA6;display:block;margin-top:4px;}
.ptag{display:inline-block;font-size:7px;letter-spacing:.15em;text-transform:uppercase;padding:2px 8px;margin-bottom:8px;border-radius:1px;}
.ptag-apalazzo{background:rgba(105,0,58,.1);color:var(--borgogna);border:1px solid rgba(105,0,58,.3);}
.ptag-coming{background:rgba(155,124,196,.1);color:#9B7CC4;border:1px dashed rgba(155,124,196,.3);}

@media(max-width:768px){
  .legend{transform:translateX(100%);}
  .legend.open{transform:translateX(0);}
  .legend-toggle{display:flex;}
  .legend-overlay.open{display:block;}
  .lt{font-size:15px;}
}
</style>
</head>

// Grey quatrefoil SVG for coming soon
function greyQF(size){
  size=size||24;
  var c=size/2,r=size*.27,o=size*.18;
  return '<svg xmlns="http://www.w3.org/2000/svg" width="'+size+'" height="'+size+'" viewBox="0 0 '+size+' '+size+'">'
    +'<circle cx="'+c+'" cy="'+(c-o)+'" r="'+r+'" fill="none" stroke="rgba(155,124,196,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>'
    +'<circle cx="'+(c+o)+'" cy="'+c+'" r="'+r+'" fill="none" stroke="rgba(155,124,196,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>'
    +'<circle cx="'+c+'" cy="'+(c+o)+'" r="'+r+'" fill="none" stroke="rgba(155,124,196,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>'
    +'<circle cx="'+(c-o)+'" cy="'+c+'" r="'+r+'" fill="none" stroke="rgba(155,124,196,0.4)" stroke-width="1.5" stroke-dasharray="3,2"/>'
    +'</svg>';
}

var map = L.map('map',{center:[45.437,12.335],zoom:14,zoomControl:false});
L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png',{attribution:'© OpenStreetMap · © CARTO',maxZoom:19}).addTo(map);
L.control.zoom({position:'bottomright'}).addTo(map);

// Add A Palazzo markers
palazzi.forEach(function(p){
  var uri = ICONS[p.col];
  var icon = L.divIcon({
    html:'<img src="'+uri+'" width="28" height="28" style="display:block;filter:drop-shadow(0 2px 5px rgba(0,0,0,.6));'+(p.bonus?'opacity:0.7;':'')+'"/>',
    className:'',iconSize:[28,28],iconAnchor:[14,14],popupAnchor:[0,-16]
  });
  var m = L.marker([p.lat,p.lng],{icon:icon}).addTo(map);
  var popup = '<div class="pw">'
    +'<span class="ptag ptag-apalazzo">A Palazzo</span>'
    +'<div class="ph"><div><img src="'+uri+'" width="24" height="24"/></div>'
    +'<div class="pht"><h3 style="color:'+p.col+';">'+p.nome+'</h3>'
    +'<div class="pf" style="color:'+p.col+';">'+p.fond+'</div></div></div>'
    +'<div class="paddr">'+p.civ+'</div>'
    +'<a href="https://lovenice.app/a-palazzo" class="pbtn pbtn-map">Mappa interattiva completa →</a>'
    +'<a href="https://lovenicemap.gumroad.com/l/a-palazzo" target="_blank" class="pbtn pbtn-buy">Acquista la guida</a>'
    +'</div>';
  m.bindPopup(popup,{maxWidth:260});
  m.on('click',function(){
    document.querySelectorAll('.li').forEach(function(el){el.classList.remove('active');});
    var el=document.querySelector('[data-id="'+p.id+'"]');
    if(el)el.classList.add('active');
  });

  // Sidebar item
  var list = document.getElementById('legend-list');
  var d = document.createElement('div');
  d.className='li'+(p.bonus?' coming':'');
  d.setAttribute('data-id',p.id);
  d.innerHTML='<div class="li-icon"><img src="'+uri+'" width="20" height="20" style="display:block;'+(p.bonus?'opacity:0.6;':'')+'"/></div>'
    +'<div class="li-info"><h3>'+p.nome+'</h3><span>'+p.civ+'</span></div>';
  d.addEventListener('click',function(){
    map.setView([p.lat,p.lng],16,{animate:true});
    m.openPopup();
    document.querySelectorAll('.li').forEach(function(el){el.classList.remove('active');});
    d.classList.add('active');
  });
  list.appendChild(d);
});

    +'<div class="pcoming">In arrivo<span class="pcoming-guide">'+c.guide+'</span></div>'
    +'</div>';
  m.bindPopup(popup,{maxWidth:260});

  var d = document.createElement('div');
  d.className='li coming';
  d.innerHTML='<div class="li-icon">'+greyQF(20)+'</div>'
    +'<div class="li-info"><h3>'+c.guide+'</h3><span>'+c.nome+'</span></div>';
  d.addEventListener('click',function(){
    map.setView([c.lat,c.lng],16,{animate:true});
    m.openPopup();
  });
  list.appendChild(d);
});

function toggleLegend(){
  document.getElementById('legend').classList.toggle('open');
  document.getElementById('overlay').classList.toggle('open');
}
function closeLegend(){
  document.getElementById('legend').classList.remove('open');
  document.getElementById('overlay').classList.remove('open');
}
